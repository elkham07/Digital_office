<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Прогресс — Digital Office</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="shell">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="brand">COACHFORGE</span>
        <span class="sub">Digital Office</span>
      </div>
    </div>
    <nav class="nav"></nav>
    <div class="sidebar-footer"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title">Мой Прогресс</div>
        <div class="page-sub">Ваши достижения и статистика</div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="theme-toggle"><i data-lucide="sun"></i></button>
        <button class="add-btn"><i data-lucide="plus"></i>Добавить замер</button>
      </div>
    </div>

    <div class="content">
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-icon si-murrey"><i data-lucide="scale"></i></div>
            <span class="stat-change down">-2.4кг</span>
          </div>
          <div class="stat-num">78.5</div>
          <div class="stat-label">Текущий вес (кг)</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-icon si-green"><i data-lucide="flame"></i></div>
            <span class="stat-change up">+15%</span>
          </div>
          <div class="stat-num">1240</div>
          <div class="stat-label">Сожжено ккал сегодня</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <div class="stat-icon si-blue"><i data-lucide="award"></i></div>
          </div>
          <div class="stat-num">12</div>
          <div class="stat-label">Тренировок за месяц</div>
        </div>
      </div>

      <div class="panel" style="margin-top:24px">
        <div class="panel-header">
          <span class="panel-title">История веса</span>
        </div>
        <div style="height: 300px; display: flex; align-items: flex-end; gap: 20px; padding: 20px;">
          <!-- Simple Bar Chart Placeholder -->
          <div style="flex:1; background: var(--murrey-glow); height: 80%; border-radius: 8px;"></div>
          <div style="flex:1; background: var(--murrey-glow); height: 75%; border-radius: 8px;"></div>
          <div style="flex:1; background: var(--murrey-glow); height: 70%; border-radius: 8px;"></div>
          <div style="flex:1; background: var(--murrey-glow); height: 65%; border-radius: 8px;"></div>
          <div style="flex:1; background: var(--murrey-glow); height: 60%; border-radius: 8px; border: 2px solid var(--murrey);"></div>
        </div>
        <div style="display:flex; justify-content: space-around; padding: 10px; font-size: 12px; color: var(--muted);">
          <span>Янв</span><span>Фев</span><span>Мар</span><span>Апр</span><span>Май</span>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="main.js"></script>
</body>
</html>
