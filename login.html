<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Digital Office</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: auto;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            text-align: center;
        }
        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .login-logo svg {
            width: 32px;
            height: 32px;
            color: var(--murrey);
        }
        .login-logo span {
            font-family: 'Bebas Neue';
            font-size: 28px;
            letter-spacing: 1px;
        }
        .login-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: var(--muted2);
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--murrey);
            background: rgba(255,255,255,0.05);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--murrey);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .login-btn:hover {
            background: var(--murrey-light);
            transform: translateY(-2px);
        }
        .error-msg {
            color: var(--offline);
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }
        .toggle-auth {
            margin-top: 24px;
            font-size: 14px;
            color: var(--muted);
        }
        .toggle-auth a {
            color: var(--murrey);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>COACHFORGE</span>
    </div>

    <div class="login-header">
        <h1 id="auth-title">С возвращением</h1>
        <p id="auth-subtitle">Войдите в свой цифровой офис</p>
    </div>

    <form id="login-form">
        <div class="form-group" id="name-group" style="display:none;">
            <label>Ваше имя</label>
            <input type="text" id="name" placeholder="Имя Фамилия">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <div class="form-group" id="role-group" style="display:none;">
            <label>Вы кто?</label>
            <select id="role" style="width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 15px;">
                <option value="coach">Тренер</option>
                <option value="client">Клиент</option>
            </select>
        </div>
        <button type="submit" class="login-btn" id="submit-btn">Войти</button>
        <div class="error-msg" id="error-msg"></div>
    </form>

    <div class="toggle-auth">
        <span id="toggle-text">Нет аккаунта?</span>
        <a href="#" id="toggle-link">Зарегистрироваться</a>
    </div>
</div>

<script>
    lucide.createIcons();
    
    const form = document.getElementById('login-form');
    const toggleLink = document.getElementById('toggle-link');
    const authTitle = document.getElementById('auth-title');
    const authSubtitle = document.getElementById('auth-subtitle');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');
    const nameGroup = document.getElementById('name-group');
    const roleGroup = document.getElementById('role-group');
    const errorMsg = document.getElementById('error-msg');

    let isLogin = true;

    toggleLink.addEventListener('click', (e) => {
        e.preventDefault();
        isLogin = !isLogin;
        
        authTitle.innerText = isLogin ? 'С возвращением' : 'Создать аккаунт';
        authSubtitle.innerText = isLogin ? 'Войдите в свой цифровой офис' : 'Начните работу прямо сейчас';
        submitBtn.innerText = isLogin ? 'Войти' : 'Зарегистрироваться';
        toggleText.innerText = isLogin ? 'Нет аккаунта?' : 'Уже есть аккаунт?';
        toggleLink.innerText = isLogin ? 'Зарегистрироваться' : 'Войти';
        
        nameGroup.style.display = isLogin ? 'none' : 'block';
        roleGroup.style.display = isLogin ? 'none' : 'block';
        errorMsg.style.display = 'none';
    });

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMsg.style.display = 'none';
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const name = document.getElementById('name').value;
        const role = document.getElementById('role').value;

        const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
        const body = isLogin ? { email, password } : { name, email, password, role };

        try {
            const res = await fetch(`http://localhost:4000${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.error || 'Ошибка авторизации');

            if (isLogin) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('userName', data.name);
                window.location.href = 'index.html';
            } else {
                alert('Регистрация успешна! Теперь войдите.');
                toggleLink.click();
            }
        } catch (err) {
            errorMsg.innerText = err.message;
            errorMsg.style.display = 'block';
        }
    });
</script>

</body>
</html>
